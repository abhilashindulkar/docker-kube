apiVersion: apps/v1
kind: Deployment
metadata:
  name: linux-tweet-app
  namespace: default
spec:
  selector:
    matchLabels:
      app: tweet
  replicas: 1
  template:
    metadata:
      labels:
        app: tweet
    spec:
      containers:
      - name: linux-tweet-app-container
        image: abhilashindulkar/linux-tweet-app:v0.01
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 15
          failureThreshold: 3
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 5
          timeoutSeconds: 5
      imagePullSecrets:
      - name: registrycreds
