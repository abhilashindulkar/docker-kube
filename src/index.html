<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linux Tweet App</title>
    <style>
        body {
            background-image: linear-gradient(-74deg, transparent 90%, rgba(255, 255, 255, 0.23) 20%),
                              linear-gradient(-74deg, transparent 83%, rgba(255, 255, 255, 0.18) 15%),
                              linear-gradient(-74deg, transparent 76%, rgba(255, 255, 255, 0.1) 15%),
                              linear-gradient(to top, #127ab1, #1799e0, #1796db);
            background-size: cover;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Geomanist', sans-serif;
        }

        .container {
            color: white;
            text-align: center;
            max-width: 600px;
            padding: 40px 20px;
        }

        .logo {
            max-width: 200px;
            margin-bottom: 20px;
        }

        h1 {
            margin-bottom: 16px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://www.docker.com/wp-content/uploads/2022/03/horizontal-logo-monochromatic-white.png" alt="Docker Logo" class="logo">
        <h1>Linux Tweet App!</h1>
        <p>You've successfully deployed the Linux tweet app! Why not let the world know?</p>
        <p>
            <a href="https://twitter.com/intent/tweet?button_hashtag=Docker&text=I%27m+learning+how+to+deploy+%23Docker+containers.&url=http%3A%2F%2Fwww.docker.com"
               target="_blank" rel="noopener noreferrer"
               style="color: white; font-weight: bold;">
                Tweet about it!
            </a>
        </p>
    </div>
</body>
</html>
