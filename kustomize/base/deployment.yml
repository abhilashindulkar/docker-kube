apiVersion: apps/v1
kind: Deployment
metadata:
  name: linux-tweet-app
  namespace: base
spec:
  selector:
    matchLabels:
      app: linux-tweet-app
  replicas: 1
  template:
    metadata:
      labels:
        app: linux-tweet-app
    spec:
      containers:
      - name: linux-tweet-app-container
        image: abhilashindulkar/linux-tweet-app:v0.01
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "250m"
        ports:
        - containerPort: 80
