apiVersion: apps/v1
kind: Deployment
metadata:
  name: linux-tweet-app
spec:
  selector:
    matchLabels:
      app: linux-tweet-app
  replicas: 1
  template:
    metadata:
      labels:
        app: linux-tweet-app
    spec:
      containers:
      - name: linux-tweet-app
        image: abhilashindulkar/linux-tweet-app
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
