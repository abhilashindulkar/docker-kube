services:
  linux-tweet-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: abhilashindulkar/linux-tweet-app:v0.01
    restart: unless-stopped
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
